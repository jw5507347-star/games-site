<!DOCTYPE html>
<html>

<head>
<title>Game Hub</title>

<style>

body{
background:#0f0f0f;
color:white;
font-family:Arial;
text-align:center;
}

h1{
margin-top:20px;
}

#search{
width:300px;
padding:10px;
margin-top:20px;
border-radius:6px;
border:none;
}

.games{
display:grid;
grid-template-columns:repeat(auto-fit,180px);
gap:20px;
justify-content:center;
margin-top:40px;
}

.game{
background:#1c1c1c;
border-radius:10px;
padding:10px;
transition:0.2s;
}

.game:hover{
transform:scale(1.05);
}

.game img{
width:160px;
height:100px;
border-radius:6px;
}

a{
color:white;
text-decoration:none;
}

</style>

<script>
function searchGames() {
let input = document.getElementById("search").value.toLowerCase();
let games = document.getElementsByClassName("game");

for (let i = 0; i < games.length; i++) {
let title = games[i].innerText.toLowerCase();
games[i].style.display = title.includes(input) ? "block" : "none";
}
}
</script>

</head>

<body>

<h1>Game Hub</h1>

<input id="search" onkeyup="searchGames()" placeholder="Search games...">

<div class="games">

<div class="game">
